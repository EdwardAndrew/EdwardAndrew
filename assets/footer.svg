<svg viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="background:#0d1117">

  <!-- Wave shape -->
  <path d="M0,60 C150,100 350,0 600,60 C850,120 1050,20 1200,60 L1200,120 L0,120 Z" fill="#1a1a2e"/>
  <path d="M0,75 C200,110 400,30 600,75 C800,120 1000,40 1200,75 L1200,120 L0,120 Z" fill="#16213e" opacity="0.8"/>
  <path d="M0,90 C250,115 450,60 600,90 C750,120 950,70 1200,90 L1200,120 L0,120 Z" fill="#0f3460" opacity="0.6"/>

  <!-- Stars -->
  <circle cx="100" cy="20" r="1" fill="white" opacity="0.6"/>
  <circle cx="250" cy="10" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="400" cy="25" r="1" fill="white" opacity="0.7"/>
  <circle cx="600" cy="8" r="1" fill="white" opacity="0.4"/>
  <circle cx="750" cy="18" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="900" cy="12" r="1" fill="white" opacity="0.5"/>
  <circle cx="1050" cy="22" r="1" fill="white" opacity="0.7"/>
  <circle cx="1150" cy="9" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="180" cy="35" r="1" fill="white" opacity="0.3"/>
  <circle cx="500" cy="30" r="1" fill="white" opacity="0.5"/>
  <circle cx="820" cy="28" r="1" fill="white" opacity="0.4"/>

  <!-- Plane group, animated flying left to right -->
  <g id="plane">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="22" ry="5" fill="#e2e8f0"/>
    <!-- Nose cone -->
    <path d="M22,0 Q32,-2 36,0 Q32,2 22,0 Z" fill="#cbd5e1"/>
    <!-- Tail fin -->
    <path d="M-22,0 L-28,-10 L-18,-2 Z" fill="#94a3b8"/>
    <!-- Tail horizontal stabiliser -->
    <path d="M-22,0 L-30,5 L-18,2 Z" fill="#94a3b8"/>
    <path d="M-22,0 L-30,-5 L-18,-2 Z" fill="#94a3b8"/>
    <!-- Main wings -->
    <path d="M-4,-5 L-14,-22 L2,-22 L10,-5 Z" fill="#cbd5e1"/>
    <path d="M-4,5 L-14,22 L2,22 L10,5 Z" fill="#cbd5e1"/>
    <!-- Wing detail -->
    <path d="M-4,-5 L2,-5 L10,-5 L6,-14 Z" fill="#94a3b8" opacity="0.4"/>
    <!-- Engine left -->
    <ellipse cx="0" cy="-15" rx="5" ry="2.5" fill="#64748b"/>
    <!-- Engine right -->
    <ellipse cx="0" cy="15" rx="5" ry="2.5" fill="#64748b"/>
    <!-- Window strip -->
    <rect x="2" y="-2" width="16" height="4" rx="2" fill="#7dd3fc" opacity="0.5"/>

    <!-- Contrail -->
    <line x1="-22" y1="0" x2="-80" y2="0" stroke="white" stroke-width="1.5" opacity="0.3" stroke-dasharray="4,6"/>

    <animateTransform
      attributeName="transform"
      type="translate"
      from="-60 42"
      to="1260 28"
      dur="8s"
      repeatCount="indefinite"
      calcMode="linear"
    />
  </g>

  <!-- Subtle glow on wave crest -->
  <path d="M0,60 C150,100 350,0 600,60 C850,120 1050,20 1200,60" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>

</svg>
